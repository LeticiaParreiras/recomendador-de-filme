<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Recomendador de Filme</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="../static/favico.ico" type="image/x-icon">
    <link rel="stylesheet" href="../static/style.css">
</head>
<body>
<main>
    <a id="back" href="/home"><img src= "../static/arrow_back.svg"></a>
    <img id="poster" src="" alt="">
    <h1 id="title"></h1>
    <a id="link" target="_blank" style="background-color: #02b4d7">Site TMDB</a>
    <button onclick="recommend()">Recomendar outro Filme</button>
</main>

<script>
    let movielist = {{ movielist | tojson }};
    function recommend (){
        if (!movielist || movielist.length === 0) {
            if(!confirm("Vários filmes já foram recomendados. Deseja continuar com novas recomendações?")){
                window.location.href = '/home';
                return;
            }
        }
        fetch('/recommend', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify({ movielist })
        })
        .then(response => {
            if (response.status === 429) {
                alert("Too many requests, please try again later.");
                return;
            }
            return response.json();
        })
        .then(data => {
           if (data) {
                if (data.filme.img){
                    document.getElementById('poster').src = data.filme.img;
                }
                else{
                    document.getElementById('poster').src = "../static/no-image-available.png";
                }
                
                document.getElementById('title').innerText = data.filme.title;
                movielist = data.remaining;
                document.getElementById('link').href = data.filme.url;
            }
        })
        .catch(err => {
            console.error(err);
        });
    }
    recommend();

</script>

</body>
</html>
